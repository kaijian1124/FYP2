name: data pipeline

on:
  schedule:
    - cron: "0 18 * * *"   # 每天 UTC 18:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: "3.10"
          auto-activate-base: false

      - name: Create environment and install dependencies
        shell: bash -l {0}
        run: |
          conda create -n myenv python=3.10 -y
          conda activate myenv

          pip install -r requirements.txt
          pip install ipykernel papermill

          python -m ipykernel install --user --name myenv --display-name "myenv"

      - name: Run DataCollection
        shell: bash -l {0}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          conda activate myenv
          papermill DataCollection.ipynb out.ipynb -k myenv

      - name: Commit data
        run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add Source/Data/
            git commit -m "auto update data" || echo "No changes to commit"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/kaijian1124/FYP2.git HEAD:main
